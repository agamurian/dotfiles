# Rounded corners — exclude tint2 and desktop elements
corner-radius = 6;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'tint2'",
  "class_g = 'dmenu'"
];

blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "_GTK_FRAME_EXTENTS@:c"
];

# Shadows
shadow = true;
shadow-radius = 35;
shadow-offset-x = -30;
shadow-offset-y = -30;
shadow-opacity = 0.25;
shadow-exclude = [
  "class_g = 'tint2'",
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

# Snappy fading — very short, barely noticeable
#fading = true;
#fade-in-step = 0.6;
#fade-out-step = 0.6;
#fade-delta = 6;

# Background blur
blur-method = "dual_kawase";
blur-strength = 7;
blur-background = true;
blur-background-frame = true;
blur-background-fixed = true;

# Backend
backend = "glx";
vsync = true;

#blur-kern = "3x3box";
dbe = false;
unredir-if-possible = false;
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
use-ewmh-active-win = true;
detect-transient = true;
detect-client-leader = true;


# Performance tweaks
glx-no-stencil = true;
glx-copy-from-front = false;
use-damage = false;
#use-damage = true;
xrender-sync-fence = true;
#
no-dock-shadow = true;

shadow-ignore-shaped = false;

inactive-opacity = 1;
frame-opacity = 1;
inactive-opacity-override = false;
active-opacity = 1;
